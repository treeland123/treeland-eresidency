<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>트리랜드 — 신분 조회</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f9f0; color: #1a2e0f; min-height: 100vh; }

    nav {
      background: #27500A;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; color: #C0DD97; font-size: 15px; font-weight: 600; text-decoration: none; }
    .nav-logo span { font-size: 20px; }
    .nav-home { font-size: 13px; color: #97C459; text-decoration: none; border: 1px solid #97C459; padding: 5px 14px; border-radius: 20px; }

    .hero {
      background: linear-gradient(160deg, #27500A 0%, #3B6D11 100%);
      padding: 2.5rem 2rem;
      text-align: center;
      color: white;
    }
    .hero h1 { font-size: 22px; font-weight: 700; margin-bottom: 0.4rem; }
    .hero p { font-size: 13px; color: rgba(255,255,255,0.75); }

    .main { max-width: 480px; margin: 0 auto; padding: 2rem 1.5rem; }

    .search-card {
      background: white;
      border-radius: 16px;
      padding: 1.75rem;
      border: 1px solid #ddeecb;
      box-shadow: 0 2px 16px rgba(0,0,0,0.05);
      margin-bottom: 1.5rem;
    }
    .search-card h2 { font-size: 15px; font-weight: 600; color: #27500A; margin-bottom: 1rem; }
    .search-row { display: flex; gap: 8px; }
    .search-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddeecb;
      border-radius: 10px;
      font-size: 14px;
      font-family: monospace;
      outline: none;
      color: #1a2e0f;
      background: #fafff6;
    }
    .search-input:focus { border-color: #639922; background: white; }
    .search-btn {
      padding: 10px 20px;
      background: #3B6D11;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-btn:hover { background: #27500A; }

    /* RESULT */
    .result-wrap { display: none; }
    .result-wrap.show { display: block; }

    .id-card {
      width: 100%;
      max-width: 340px;
      height: 200px;
      border-radius: 14px;
      background: linear-gradient(135deg, #27500A 0%, #3B6D11 55%, #639922 100%);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      margin: 0 auto 1.25rem;
      position: relative;
      overflow: hidden;
    }
    .card-deco { position: absolute; width: 160px; height: 160px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.1); top: -55px; right: -35px; }
    .card-deco2 { position: absolute; width: 100px; height: 100px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.07); bottom: -25px; left: 15px; }

    .result-card {
      background: white;
      border-radius: 14px;
      padding: 1.25rem;
      border: 1px solid #ddeecb;
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #f0f7e8;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #639922; }
    .status-text { font-size: 14px; font-weight: 600; color: #3B6D11; }
    .result-field { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f9fdf5; }
    .result-field:last-child { border-bottom: none; }
    .r-key { font-size: 12px; color: #6b7c5a; }
    .r-val { font-size: 13px; font-weight: 600; color: #1a2e0f; }

    .not-found-card {
      background: white;
      border-radius: 14px;
      padding: 2rem;
      border: 1px solid #fdecea;
      text-align: center;
      display: none;
    }
    .not-found-card.show { display: block; }
    .not-found-icon { font-size: 36px; margin-bottom: 0.75rem; }
    .not-found-card h3 { font-size: 15px; font-weight: 600; color: #922b21; margin-bottom: 0.4rem; }
    .not-found-card p { font-size: 13px; color: #6b7c5a; }

    footer { text-align: center; padding: 2rem; font-size: 12px; color: #a0b090; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html"><span>🌲</span> 트리랜드 자유공화국</a>
  <a class="nav-home" href="index.html">홈으로</a>
</nav>

<div class="hero">
  <h1>🔍 레지던트 신분 조회</h1>
  <p>레지던트 ID를 입력하거나 QR 코드를 스캔하세요.</p>
</div>

<div class="main">
  <div class="search-card">
    <h2>ID로 조회</h2>
    <div class="search-row">
      <input class="search-input" id="search-input" placeholder="TLR-0001" onkeydown="if(event.key==='Enter') doSearch()" />
      <button class="search-btn" onclick="doSearch()">조회</button>
    </div>
  </div>

  <div class="result-wrap" id="result-wrap">
    <div class="id-card">
      <div class="card-deco"></div>
      <div class="card-deco2"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:16px;">🌲</span>
          <div>
            <div style="font-size:8px;color:rgba(255,255,255,0.85);font-weight:600;">TREELAND FREE REPUBLIC</div>
            <div style="font-size:7px;color:rgba(255,255,255,0.6);">트리랜드 자유공화국</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:7px;color:rgba(255,255,255,0.6);letter-spacing:1px;">E-RESIDENT</div>
          <div style="font-size:7px;color:rgba(255,255,255,0.5);margin-top:1px;">전자시민</div>
        </div>
      </div>
      <div style="position:relative;z-index:1;">
        <div style="width:28px;height:20px;background:rgba(255,255,255,0.2);border-radius:3px;border:1px solid rgba(255,255,255,0.3);"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:1;">
        <div>
          <div style="font-size:7px;color:rgba(255,255,255,0.55);letter-spacing:0.5px;">NAME / 성명</div>
          <div style="font-size:16px;font-weight:600;color:white;" id="card-name">—</div>
          <div style="display:flex;gap:14px;margin-top:3px;">
            <div>
              <div style="font-size:7px;color:rgba(255,255,255,0.55);">ID NO.</div>
              <div style="font-size:9px;color:rgba(255,255,255,0.9);font-weight:600;" id="card-id">—</div>
            </div>
            <div>
              <div style="font-size:7px;color:rgba(255,255,255,0.55);">NATION</div>
              <div style="font-size:9px;color:rgba(255,255,255,0.9);font-weight:600;" id="card-nation">—</div>
            </div>
            <div>
              <div style="font-size:7px;color:rgba(255,255,255,0.55);">ISSUED</div>
              <div style="font-size:9px;color:rgba(255,255,255,0.9);font-weight:600;" id="card-date">—</div>
            </div>
          </div>
        </div>
        <div style="background:rgba(255,255,255,0.95);border-radius:4px;padding:3px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#3B6D11;font-weight:600;">VALID</div>
      </div>
    </div>

    <div class="result-card">
      <div class="result-header">
        <div class="status-dot"></div>
        <div class="status-text">유효한 레지던트</div>
      </div>
      <div class="result-field"><span class="r-key">성명</span><span class="r-val" id="r-name">—</span></div>
      <div class="result-field"><span class="r-key">레지던트 ID</span><span class="r-val" id="r-id">—</span></div>
      <div class="result-field"><span class="r-key">국적</span><span class="r-val" id="r-nation">—</span></div>
      <div class="result-field"><span class="r-key">발급일</span><span class="r-val" id="r-date">—</span></div>
      <div class="result-field"><span class="r-key">상태</span><span class="r-val" style="color:#3B6D11;">활성 (Active)</span></div>
    </div>
  </div>

  <div class="not-found-card" id="not-found">
    <div class="not-found-icon">❌</div>
    <h3>레지던트를 찾을 수 없습니다</h3>
    <p>ID를 다시 확인하거나 관리자에게 문의하세요.</p>
  </div>
</div>

<footer>🌲 Treeland Free Republic · 트리랜드 자유공화국</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAvIHKAXICU7sl12YKM8LFBIrcFA79_RrY",
    authDomain: "treeland-eresidency.firebaseapp.com",
    projectId: "treeland-eresidency",
    storageBucket: "treeland-eresidency.firebasestorage.app",
    messagingSenderId: "970872425624",
    appId: "1:970872425624:web:5bba8e4b33fe4a272454ed"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // URL 파라미터로 자동 조회
  const params = new URLSearchParams(window.location.search);
  const autoId = params.get("id");
  if (autoId) {
    document.getElementById("search-input").value = autoId;
    setTimeout(() => window.doSearch(), 500);
  }

  window.doSearch = async function() {
    const input = document.getElementById("search-input").value.trim().toUpperCase();
    if (!input) return;

    document.getElementById("result-wrap").classList.remove("show");
    document.getElementById("not-found").classList.remove("show");

    const q = query(collection(db, "residents"), where("residentId", "==", input));
    const snap = await getDocs(q);

    if (snap.empty) {
      document.getElementById("not-found").classList.add("show");
      return;
    }

    const data = snap.docs[0].data();
    document.getElementById("card-name").textContent = data.name;
    document.getElementById("card-id").textContent = data.residentId;
    document.getElementById("card-nation").textContent = (data.nation || "").slice(0, 8);
    document.getElementById("card-date").textContent = data.issuedAt;
    document.getElementById("r-name").textContent = data.name;
    document.getElementById("r-id").textContent = data.residentId;
    document.getElementById("r-nation").textContent = data.nation;
    document.getElementById("r-date").textContent = data.issuedAt;
    document.getElementById("result-wrap").classList.add("show");
  }
</script>

</body>
</html>
